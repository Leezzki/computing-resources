<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supermarket Scanner</title>
  <style>
    :root {
      --bg: #f7f9ef;
      --panel: #ffffff;
      --panel-2: #fff7e1;
      --ink: #22303c;
      --muted: #5a6b78;
      --green: #2e8b57;
      --green-dark: #1f6c42;
      --yellow: #ffcb4d;
      --orange: #ff8a3d;
      --red: #d95c5c;
      --shadow: 0 16px 40px rgba(34, 48, 60, 0.12);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Trebuchet MS", "Verdana", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 203, 77, 0.30), transparent 34%),
        radial-gradient(circle at top right, rgba(46, 139, 87, 0.18), transparent 30%),
        linear-gradient(180deg, #f8fbf1 0%, #eef8f0 100%);
      color: var(--ink);
    }

    body {
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(45deg, rgba(255,255,255,0.16) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.16) 50%, rgba(255,255,255,0.16) 75%, transparent 75%, transparent);
      background-size: 80px 80px;
      opacity: 0.22;
      pointer-events: none;
      z-index: 0;
    }

    .shell {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 18px 22px;
      margin-bottom: 18px;
      border-radius: var(--radius);
      background: rgba(255,255,255,0.82);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .eyebrow {
      margin: 0 0 6px;
      font-size: 0.92rem;
      letter-spacing: 0.03em;
      color: var(--green-dark);
      font-weight: 700;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 1.1rem;
    }

    .star-meter {
      min-width: 156px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border-radius: 20px;
      background: linear-gradient(180deg, #fffbe8, #fff1b9);
      border: 3px solid rgba(255, 203, 77, 0.72);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.7);
      font-weight: 700;
      font-size: 1.1rem;
      white-space: nowrap;
    }

    .stars {
      font-size: 1.5rem;
      letter-spacing: 0.15em;
      color: #d9b100;
    }

    main {
      display: block;
    }

    .panel {
      background: rgba(255,255,255,0.9);
      border-radius: calc(var(--radius) + 4px);
      box-shadow: var(--shadow);
      padding: clamp(18px, 3vw, 30px);
      border: 3px solid rgba(46, 139, 87, 0.12);
    }

    .hero {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.94), rgba(255,255,255,0.9)),
        linear-gradient(135deg, rgba(255, 203, 77, 0.22), rgba(46, 139, 87, 0.12));
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 22px;
      align-items: center;
    }

    .hero-art {
      min-height: 240px;
      border-radius: 28px;
      background:
        radial-gradient(circle at 28% 28%, rgba(255, 203, 77, 0.95) 0 17%, transparent 18%),
        radial-gradient(circle at 72% 32%, rgba(255, 138, 61, 0.95) 0 16%, transparent 17%),
        radial-gradient(circle at 50% 66%, rgba(46, 139, 87, 0.92) 0 18%, transparent 19%),
        linear-gradient(180deg, #e7fff1, #fff7df);
      display: grid;
      place-items: center;
      text-align: center;
      font-size: clamp(3.2rem, 10vw, 5rem);
      box-shadow: inset 0 0 0 4px rgba(255,255,255,0.55);
    }

    .mission-title {
      margin: 0 0 10px;
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      color: var(--green-dark);
    }

    .big-text {
      font-size: clamp(1.2rem, 2.4vw, 1.5rem);
      line-height: 1.45;
      margin: 0 0 18px;
      color: var(--ink);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 10px 16px;
      background: #fff4c5;
      color: #7b5900;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    button {
      border: 0;
      border-radius: 18px;
      font: inherit;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    button:hover { transform: translateY(-2px); }
    button:active { transform: translateY(0); }
    button:focus-visible {
      outline: 4px solid rgba(255, 138, 61, 0.4);
      outline-offset: 3px;
    }

    .btn-primary {
      background: linear-gradient(180deg, #ffcb4d, #ffb92d);
      color: #3f2d00;
      font-weight: 800;
      box-shadow: 0 8px 0 #c88d10;
      padding: 16px 24px;
      min-width: 170px;
      font-size: 1.2rem;
    }

    .btn-secondary {
      background: linear-gradient(180deg, #e9f7ef, #d1f0de);
      color: #0f4c2f;
      font-weight: 800;
      box-shadow: 0 8px 0 #9dd1b2;
      padding: 16px 22px;
      min-width: 170px;
      font-size: 1.1rem;
    }

    .btn-option {
      background: linear-gradient(180deg, #ffffff, #f4faf6);
      border: 3px solid #dce8df;
      color: var(--ink);
      font-weight: 700;
      padding: 16px 18px;
      min-height: 72px;
      width: 100%;
      text-align: left;
      box-shadow: 0 6px 0 rgba(34, 48, 60, 0.08);
    }

    .btn-option.correct {
      background: linear-gradient(180deg, #dcfbe9, #c8f3d8);
      border-color: #71c78e;
    }

    .btn-option.wrong {
      background: linear-gradient(180deg, #fff1f1, #ffe1e1);
      border-color: #ef9898;
    }

    .btn-option:disabled {
      cursor: default;
      opacity: 0.95;
      transform: none;
    }

    .section-title {
      margin: 0 0 10px;
      font-size: clamp(1.6rem, 3vw, 2.3rem);
      color: var(--green-dark);
    }

    .section-note {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.5;
    }

    .diagram {
      display: grid;
      grid-template-columns: repeat(11, minmax(0, 1fr));
      gap: 12px;
      align-items: center;
      margin: 18px 0 20px;
    }

    .diagram-part {
      grid-column: span 2;
      min-height: 90px;
      padding: 14px 10px;
      border-radius: 20px;
      background: linear-gradient(180deg, #ffffff, #f5fbf7);
      border: 3px solid #dbe9df;
      font-weight: 800;
      text-align: center;
      box-shadow: 0 6px 0 rgba(34, 48, 60, 0.06);
    }

    .diagram-part.active {
      background: linear-gradient(180deg, #fff7cc, #ffe9a5);
      border-color: #ffcb4d;
    }

    .diagram-arrow {
      grid-column: span 1;
      text-align: center;
      font-size: 2rem;
      color: var(--green-dark);
      font-weight: 800;
    }

    .explain-box {
      margin-top: 10px;
      padding: 18px;
      background: var(--panel-2);
      border-radius: 20px;
      border: 3px dashed rgba(255, 138, 61, 0.35);
      min-height: 74px;
      font-size: 1.14rem;
      line-height: 1.4;
      display: flex;
      align-items: center;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      align-items: start;
    }

    .product-card, .receipt-card, .quiz-card {
      background: linear-gradient(180deg, #ffffff, #f8fffb);
      border: 3px solid #ddeadd;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 8px 0 rgba(34, 48, 60, 0.06);
    }

    .product-card h3, .receipt-card h3, .quiz-card h3 {
      margin: 0 0 10px;
      font-size: 1.5rem;
      color: var(--green-dark);
    }

    .barcode {
      display: inline-block;
      margin-top: 8px;
      padding: 10px 14px;
      border-radius: 14px;
      background: #eef7ff;
      border: 2px solid #b7d9ff;
      font-weight: 800;
      font-size: 1.2rem;
      letter-spacing: 0.08em;
    }

    .scan-read {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 16px;
      background: #f1fff6;
      border: 2px solid #87d5a5;
      font-size: 1.15rem;
      font-weight: 700;
    }

    .product-icon {
      width: 92px;
      height: 92px;
      display: grid;
      place-items: center;
      border-radius: 24px;
      background: linear-gradient(180deg, #fff2c9, #ffe7a2);
      font-size: 3.2rem;
      line-height: 1;
      margin-bottom: 10px;
      box-shadow: inset 0 0 0 3px rgba(255,255,255,0.65);
    }

    .card-disabled {
      opacity: 0.48;
      filter: grayscale(0.9);
    }

    .card-disabled button,
    .card-disabled .btn-option {
      pointer-events: none;
    }

    .till-display {
      min-height: 210px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 18px;
      border-radius: 22px;
      background: linear-gradient(180deg, #f5f9ff, #edf6ff);
      border: 3px dashed rgba(92, 142, 207, 0.35);
    }

    .till-display.empty {
      color: var(--muted);
      font-weight: 700;
    }

    .till-name {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--green-dark);
      margin: 8px 0 6px;
    }

    .till-price {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 900;
      color: #7b5900;
      margin: 0;
    }

    .scan-stack {
      display: grid;
      gap: 14px;
    }

    .scan-card {
      display: grid;
      gap: 12px;
    }

    .scan-card .button-row {
      margin-top: 0;
    }

    .receipt-summary {
      margin-top: 14px;
      padding: 14px;
      border-radius: 18px;
      background: #fffaf0;
      border: 2px solid rgba(255, 203, 77, 0.55);
      font-weight: 700;
    }

    .match-board {
      display: grid;
      grid-template-columns: 1fr 0.95fr;
      gap: 18px;
      align-items: start;
    }

    .match-list {
      display: grid;
      gap: 12px;
    }

    .barcode-list {
      display: grid;
      gap: 12px;
    }

    .match-card {
      display: grid;
      gap: 8px;
      text-align: left;
      width: 100%;
      min-height: 120px;
      padding: 16px;
      border-radius: 22px;
      background: linear-gradient(180deg, #ffffff, #f8fffb);
      border: 3px solid #ddeadd;
      box-shadow: 0 8px 0 rgba(34, 48, 60, 0.06);
    }

    .match-card .match-label {
      margin: 0;
      font-size: 1.05rem;
      color: var(--muted);
      font-weight: 700;
    }

    .barcode-card {
      width: 100%;
      min-height: 96px;
      padding: 14px 16px;
      border-radius: 22px;
      background: linear-gradient(180deg, #ffffff, #f5fbff);
      border: 3px solid #d4e6fb;
      box-shadow: 0 8px 0 rgba(34, 48, 60, 0.06);
      text-align: center;
      font-weight: 900;
      letter-spacing: 0.12em;
    }

    .barcode-card small {
      display: block;
      margin-bottom: 8px;
      letter-spacing: 0.02em;
      color: var(--muted);
      font-weight: 700;
    }

    .match-selected {
      outline: 5px solid rgba(255, 138, 61, 0.3);
      border-color: #ff8a3d;
    }

    .match-complete {
      background: linear-gradient(180deg, #dcfbe9, #c8f3d8);
      border-color: #72c88d;
    }

    .match-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      border-radius: 999px;
      background: #fff5cf;
      font-size: 0.98rem;
      font-weight: 800;
      color: #6c4c00;
      margin-bottom: 10px;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .feedback {
      margin: 16px 0 0;
      min-height: 1.6em;
      font-size: 1.12rem;
      font-weight: 700;
      color: var(--green-dark);
    }

    .feedback.bad {
      color: var(--red);
    }

    .receipt-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 10px;
    }

    .receipt-line {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 12px 14px;
      border-radius: 16px;
      background: #fffdf4;
      border: 2px dashed rgba(46, 139, 87, 0.25);
      font-size: 1.05rem;
      font-weight: 700;
    }

    .total-box {
      margin-top: 16px;
      padding: 16px;
      border-radius: 18px;
      background: linear-gradient(180deg, #fff4c5, #ffe69a);
      font-size: 1.25rem;
      font-weight: 800;
      text-align: center;
      color: #594000;
    }

    .receipt-wrap {
      display: grid;
      grid-template-columns: 1fr 1.1fr;
      gap: 18px;
    }

    .question-number {
      margin: 0 0 8px;
      color: var(--orange);
      font-weight: 800;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .quiz-question {
      margin: 0 0 14px;
      font-size: clamp(1.3rem, 2.8vw, 1.8rem);
      line-height: 1.35;
    }

    .final-screen {
      text-align: center;
      background:
        radial-gradient(circle at top, rgba(255, 203, 77, 0.24), transparent 46%),
        linear-gradient(180deg, #ffffff, #f7fff9);
    }

    .final-badge {
      display: inline-block;
      padding: 14px 18px;
      border-radius: 999px;
      background: linear-gradient(180deg, #dcfbe9, #c9f5d9);
      border: 3px solid #72c88d;
      color: #135736;
      font-weight: 800;
      font-size: 1.08rem;
      margin-bottom: 14px;
    }

    .final-title {
      margin: 8px 0 10px;
      font-size: clamp(2.2rem, 6vw, 4rem);
      color: var(--green-dark);
    }

    .final-subtitle {
      margin: 0 auto 20px;
      max-width: 760px;
      font-size: clamp(1.1rem, 2.4vw, 1.4rem);
      line-height: 1.5;
    }

    .final-stars {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 18px;
      border-radius: 20px;
      background: #fff6cf;
      font-size: 1.2rem;
      font-weight: 800;
      margin-bottom: 18px;
    }

    .hidden {
      display: none !important;
    }

    #confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 2;
    }

    .confetti-piece {
      position: absolute;
      top: -20px;
      width: 12px;
      height: 20px;
      border-radius: 4px;
      opacity: 0.95;
      animation: confetti-fall 3.8s linear forwards;
    }

    @keyframes confetti-fall {
      0% { transform: translate3d(0, 0, 0) rotate(0deg); opacity: 1; }
      100% { transform: translate3d(var(--drift), 110vh, 0) rotate(720deg); opacity: 0.95; }
    }

    @media (max-width: 900px) {
      .hero-grid,
      .grid-2,
      .receipt-wrap,
      .match-board {
        grid-template-columns: 1fr;
      }

      .diagram {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .diagram-part {
        grid-column: span 1;
      }

      .diagram-arrow {
        display: none;
      }
    }

    @media (max-width: 700px) {
      .shell {
        padding: 12px;
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .choices {
        grid-template-columns: 1fr;
      }

      .btn-primary,
      .btn-secondary {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Year 2 Computing</p>
        <h1>Supermarket Scanner</h1>
        <p class="subtitle">Can you help the till find the product and price?</p>
      </div>
      <div class="star-meter" aria-live="polite">
        <span class="stars" id="starVisual" aria-hidden="true">☆☆☆☆☆☆☆☆☆☆☆☆☆</span>
        <span><span id="starCount">0</span>/<span id="starTotal">13</span> stars</span>
      </div>
    </header>

    <main id="app"></main>
  </div>

  <div id="confetti" aria-hidden="true"></div>

    <script>
    // One editable product list for all supermarket activities.
    const PRODUCTS = [
      { name: "Apple Juice", barcode: "1001", price: 25, icon: "🧃" },
      { name: "Banana", barcode: "1002", price: 10, icon: "🍌" },
      { name: "Milk", barcode: "1003", price: 18, icon: "🥛" },
      { name: "Bread", barcode: "1004", price: 30, icon: "🍞" },
      { name: "Eggs", barcode: "1005", price: 42, icon: "🥚" },
      { name: "Rice", barcode: "1006", price: 55, icon: "🍚" },
      { name: "Noodles", barcode: "1007", price: 20, icon: "🍜" },
      { name: "Cereal", barcode: "1008", price: 48, icon: "🥣" },
      { name: "Yogurt", barcode: "1009", price: 22, icon: "🍨" },
      { name: "Orange", barcode: "1010", price: 15, icon: "🍊" },
      { name: "Soap", barcode: "1011", price: 28, icon: "🧼" },
      { name: "Pencil", barcode: "1012", price: 8, icon: "✏️" }
    ];

    const QUIZ_QUESTIONS = [
      {
        question: "Why are barcode scanners useful?",
        options: [
          "They make scanning quicker.",
          "They make food taste better.",
          "They make shops darker."
        ],
        answer: 0
      },
      {
        question: "What does the till do?",
        options: [
          "Finds the product and price.",
          "Paints a picture.",
          "Plays music."
        ],
        answer: 0
      },
      {
        question: "Why is IT helpful in shops?",
        options: [
          "It saves time and helps keep records.",
          "It makes people run.",
          "It hides the products."
        ],
        answer: 0
      }
    ];

    const TOTAL_STARS = 1 + 3 + 6 + QUIZ_QUESTIONS.length;

    const state = {
      screen: "welcome",
      stars: 0,
      runId: 0,
      confettiLaunched: false,
      systemMessage: "",
      seenParts: new Set(),
      activity2: {
        item: null,
        scanning: false,
        solved: false,
        feedback: "",
        feedbackBad: false
      },
      receipt: {
        items: [],
        scanned: {},
        scanning: {},
        lines: [],
        feedback: "",
        feedbackBad: false
      },
      match: {
        products: [],
        barcodes: [],
        selectedProduct: "",
        selectedBarcode: "",
        matched: {},
        feedback: "",
        feedbackBad: false
      },
      quiz: {
        order: [],
        index: 0,
        solvedFlags: {},
        feedback: "",
        feedbackBad: false,
        locked: false
      }
    };

    const app = document.getElementById("app");
    const starCountEl = document.getElementById("starCount");
    const starVisualEl = document.getElementById("starVisual");
    const starTotalEl = document.getElementById("starTotal");
    const confettiEl = document.getElementById("confetti");

    let audioContext = null;

    function shuffleArray(list) {
      const copy = list.slice();
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function cloneProduct(product) {
      return { ...product };
    }

    function pickRandomProduct() {
      return shuffleArray(PRODUCTS)[0];
    }

    function pickUniqueProducts(count) {
      return shuffleArray(PRODUCTS).slice(0, count);
    }

    function findProductByBarcode(barcode) {
      return PRODUCTS.find((product) => product.barcode === barcode) || null;
    }

    function updateStars() {
      starTotalEl.textContent = TOTAL_STARS;
      starCountEl.textContent = state.stars;
      starVisualEl.textContent = "⭐".repeat(state.stars) + "☆".repeat(Math.max(0, TOTAL_STARS - state.stars));
    }

    function awardStar(flagContainer, key) {
      if (!flagContainer[key]) {
        flagContainer[key] = true;
        state.stars += 1;
        updateStars();
      }
    }

    function schedule(fn, delay) {
      const token = state.runId;
      window.setTimeout(() => {
        if (state.runId === token) {
          fn();
        }
      }, delay);
    }

    function playBeep() {
      const Context = window.AudioContext || window.webkitAudioContext;
      if (!Context) return;
      if (!audioContext) {
        audioContext = new Context();
      }
      if (audioContext.state === "suspended") {
        audioContext.resume();
      }

      const now = audioContext.currentTime;
      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();
      oscillator.type = "square";
      oscillator.frequency.setValueAtTime(880, now);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.09, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
      oscillator.connect(gain);
      gain.connect(audioContext.destination);
      oscillator.start(now);
      oscillator.stop(now + 0.2);
    }

    function playMatchSound(kind) {
      const Context = window.AudioContext || window.webkitAudioContext;
      if (!Context) return;
      if (!audioContext) {
        audioContext = new Context();
      }
      if (audioContext.state === "suspended") {
        audioContext.resume();
      }

      const now = audioContext.currentTime;
      const notes = kind === "correct"
        ? [784, 988]
        : [220, 196];
      const durations = kind === "correct"
        ? [0.12, 0.16]
        : [0.14, 0.18];
      const wave = kind === "correct" ? "triangle" : "square";

      notes.forEach((frequency, index) => {
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();
        const start = now + index * 0.11;
        oscillator.type = wave;
        oscillator.frequency.setValueAtTime(frequency, start);
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(kind === "correct" ? 0.08 : 0.06, start + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + durations[index]);
        oscillator.connect(gain);
        gain.connect(audioContext.destination);
        oscillator.start(start);
        oscillator.stop(start + durations[index] + 0.02);
      });
    }

    function createRunState() {
      const scanItem = cloneProduct(pickRandomProduct());
      const receiptItems = pickUniqueProducts(3).map(cloneProduct);
      const matchProducts = pickUniqueProducts(6).map(cloneProduct);

      state.activity2 = {
        item: scanItem,
        scanning: false,
        solved: false,
        feedback: "Tap Scan to read the barcode.",
        feedbackBad: false
      };

      state.receipt = {
        items: receiptItems,
        scanned: {},
        scanning: {},
        lines: [],
        feedback: "Scan each item to build the receipt.",
        feedbackBad: false
      };

      state.match = {
        products: shuffleArray(matchProducts),
        barcodes: shuffleArray(matchProducts.map((product) => product.barcode)),
        selectedProduct: "",
        selectedBarcode: "",
        matched: {},
        feedback: "Match a product card to a barcode card.",
        feedbackBad: false
      };

      state.quiz = {
        order: shuffleArray(QUIZ_QUESTIONS),
        index: 0,
        solvedFlags: {},
        feedback: "Pick one answer.",
        feedbackBad: false,
        locked: false
      };
    }

    function resetGame() {
      state.runId += 1;
      state.screen = "welcome";
      state.stars = 0;
      state.confettiLaunched = false;
      state.systemMessage = "";
      state.seenParts = new Set();
      createRunState();
      confettiEl.innerHTML = "";
      updateStars();
      render();
    }

    function partText(part) {
      const parts = {
        product: "This is what the customer wants to buy.",
        barcode: "The barcode has a code for the product.",
        scanner: "The scanner reads the barcode.",
        till: "The till uses the code to find the product.",
        price: "The computer finds the price.",
        receipt: "The receipt shows what was bought."
      };
      return parts[part] || "";
    }

    function currentQuizItem() {
      return state.quiz.order[state.quiz.index];
    }

    function launchConfetti() {
      confettiEl.innerHTML = "";
      const colors = ["#ffcb4d", "#ff8a3d", "#2e8b57", "#7dd3fc", "#f472b6"];
      const pieces = 70;

      for (let i = 0; i < pieces; i += 1) {
        const piece = document.createElement("span");
        piece.className = "confetti-piece";
        piece.style.left = `${Math.random() * 100}%`;
        piece.style.background = colors[i % colors.length];
        piece.style.setProperty("--drift", `${(Math.random() * 2 - 1) * 160}px`);
        piece.style.animationDelay = `${Math.random() * 0.9}s`;
        piece.style.transform = `rotate(${Math.random() * 180}deg)`;
        piece.style.width = `${8 + Math.random() * 10}px`;
        piece.style.height = `${10 + Math.random() * 16}px`;
        confettiEl.appendChild(piece);
      }
    }

    function renderWelcome() {
      return `
        <section class="panel hero">
          <div class="hero-grid">
            <div>
              <div class="badge">🛒 Supermarket Mission</div>
              <h2 class="mission-title">Supermarket Scanner</h2>
              <p class="big-text">Can you help the till find the product and price?</p>
              <p class="big-text">Tap start to begin your shop helper mission.</p>
              <div class="button-row">
                <button class="btn-primary" data-action="start">Start</button>
              </div>
            </div>
            <div class="hero-art" aria-hidden="true">🧾</div>
          </div>
        </section>
      `;
    }

    function renderSystem() {
      const labels = ["product", "barcode", "scanner", "till", "price", "receipt"];
      return `
        <section class="panel">
          <h2 class="section-title">Activity 1: Meet the system</h2>
          <p class="section-note">Tap each box to learn what it does.</p>

          <div class="diagram" aria-label="Product to receipt diagram">
            ${labels.map((part, index) => `
              <button class="diagram-part ${state.seenParts.has(part) ? "active" : ""}" data-action="part" data-part="${part}">
                ${part.charAt(0).toUpperCase() + part.slice(1)}
              </button>
              ${index < labels.length - 1 ? '<div class="diagram-arrow">→</div>' : ""}
            `).join("")}
          </div>

          <div class="explain-box" role="status" aria-live="polite">
            ${state.systemMessage || "Tap a box to see a simple explanation."}
          </div>

          <div class="button-row" style="margin-top: 18px;">
            <button class="btn-secondary" data-action="next" data-screen="scan">Next</button>
          </div>
        </section>
      `;
    }

    function renderScanItem() {
      const item = state.activity2.item;
      return `
        <section class="panel">
          <h2 class="section-title">Activity 2: Scan the item</h2>
          <p class="section-note">Press Scan. The till will show the product and the price.</p>

          <div class="grid-2">
            <div class="product-card ${state.activity2.solved ? "card-disabled" : ""}">
              <div class="product-icon" aria-hidden="true">${item.icon}</div>
              <h3>${item.name}</h3>
              <p class="section-note" style="margin-bottom: 0;">Barcode: ${item.barcode}</p>
              <div class="button-row" style="margin-top: 16px;">
                <button class="btn-primary" data-action="scan-item" ${state.activity2.scanning || state.activity2.solved ? "disabled" : ""}>
                  ${state.activity2.scanning ? "Beep..." : state.activity2.solved ? "Scanned" : "Scan"}
                </button>
              </div>
              <p class="feedback ${state.activity2.feedbackBad ? "bad" : ""}" aria-live="polite">${state.activity2.feedback}</p>
            </div>

            <div class="product-card">
              <h3>Till display</h3>
              <div class="till-display ${state.activity2.solved ? "" : "empty"}" aria-live="polite">
                ${state.activity2.solved ? `
                  <div>
                    <div class="product-icon" style="margin: 0 auto 10px;">${item.icon}</div>
                    <div class="till-name">${item.name}</div>
                    <p class="till-price">${item.price} baht</p>
                  </div>
                ` : "<span>Waiting for scan.</span>"}
              </div>
              <div class="scan-read" style="margin-top: 14px;">
                ${state.activity2.solved ? `Scanner found ${item.name}.` : "Tap Scan to start."}
              </div>
            </div>
          </div>

          <div class="button-row" style="margin-top: 18px;">
            <button class="btn-secondary" data-action="next" data-screen="receipt" ${!state.activity2.solved ? "disabled" : ""}>Next</button>
          </div>
        </section>
      `;
    }

    function renderReceipt() {
      const total = state.receipt.lines.reduce((sum, line) => sum + line.price, 0);
      const allScanned = state.receipt.lines.length === state.receipt.items.length;

      return `
        <section class="panel">
          <h2 class="section-title">Activity 3: Build the receipt</h2>
          <p class="section-note">Scan 3 items. The receipt updates after each scan.</p>

          <div class="receipt-wrap">
            <div class="scan-stack">
              ${state.receipt.items.map((item) => {
                const scanned = Boolean(state.receipt.scanned[item.barcode]);
                const scanning = Boolean(state.receipt.scanning[item.barcode]);
                return `
                  <div class="product-card scan-card ${scanned ? "card-disabled" : ""}">
                    <div class="product-icon" aria-hidden="true">${item.icon}</div>
                    <h3>${item.name}</h3>
                    <p class="section-note" style="margin-bottom: 0;">Barcode: ${item.barcode}</p>
                    <div class="button-row">
                      <button class="btn-primary" data-action="scan-receipt-item" data-barcode="${item.barcode}" ${scanned || scanning ? "disabled" : ""}>
                        ${scanning ? "Beep..." : scanned ? "Done" : "Scan"}
                      </button>
                    </div>
                    ${scanned ? `<div class="scan-read">Added to receipt: ${item.price} baht</div>` : ""}
                  </div>
                `;
              }).join("")}
            </div>

            <div class="receipt-card">
              <h3>Receipt</h3>
              <ul class="receipt-list">
                ${state.receipt.lines.map((line) => `
                  <li class="receipt-line">
                    <span>${line.icon} ${line.name}</span>
                    <span>${line.price} baht</span>
                  </li>
                `).join("")}
              </ul>
              <div class="total-box">Total: ${total} baht</div>
              <div class="receipt-summary">${allScanned ? "Great! The receipt is complete." : "Scan all 3 items to finish."}</div>
            </div>
          </div>

          <div class="button-row" style="margin-top: 18px;">
            <button class="btn-secondary" data-action="next" data-screen="match" ${!allScanned ? "disabled" : ""}>Next</button>
          </div>
        </section>
      `;
    }

    function renderMatchBarcode() {
      const matchedCount = Object.keys(state.match.matched).length;
      const allMatched = matchedCount === state.match.products.length;

      return `
        <section class="panel">
          <h2 class="section-title">Activity 4: Match the barcode</h2>
          <p class="section-note">Click a product and then click the matching barcode.</p>
          <p class="match-pill">${matchedCount}/${state.match.products.length} matches</p>

          <div class="match-board">
            <div class="match-list">
              ${state.match.products.map((product) => {
                const matched = Boolean(state.match.matched[product.barcode]);
                const selected = state.match.selectedProduct === product.barcode;
                return `
                  <button
                    class="match-card ${matched ? "match-complete" : ""} ${selected ? "match-selected" : ""}"
                    data-action="pick-product"
                    data-barcode="${product.barcode}"
                    ${matched ? "disabled" : ""}
                  >
                    <p class="match-label">${matched ? "Matched" : "Product"}</p>
                    <div class="product-icon" aria-hidden="true">${product.icon}</div>
                    <h3 style="margin: 0;">${product.name}</h3>
                    <p class="match-label">${matched ? "Great!" : "Pick the barcode"}</p>
                  </button>
                `;
              }).join("")}
            </div>

            <div class="barcode-list">
              ${state.match.barcodes.map((barcode) => {
                const matched = Boolean(state.match.matched[barcode]);
                const selected = state.match.selectedBarcode === barcode;
                return `
                  <button
                    class="barcode-card ${matched ? "match-complete" : ""} ${selected ? "match-selected" : ""}"
                    data-action="pick-barcode"
                    data-barcode="${barcode}"
                    ${matched ? "disabled" : ""}
                  >
                    <small>${matched ? "Matched" : "Barcode"}</small>
                    <div style="font-size: 1.9rem; line-height: 1.2;">${barcode}</div>
                  </button>
                `;
              }).join("")}
            </div>
          </div>

          <p class="feedback ${state.match.feedbackBad ? "bad" : ""}" aria-live="polite">${state.match.feedback}</p>

          <div class="button-row" style="margin-top: 18px;">
            <button class="btn-secondary" data-action="next" data-screen="quiz" ${!allMatched ? "disabled" : ""}>Next</button>
          </div>
        </section>
      `;
    }

    function renderQuiz() {
      if (state.quiz.index >= state.quiz.order.length) {
        state.screen = "final";
        render();
        return "";
      }

      const question = currentQuizItem();

      return `
        <section class="panel">
          <h2 class="section-title">Activity 5: What helps the shop?</h2>
          <p class="section-note">Choose the best answer. You can try again if you need to.</p>

          <div class="quiz-card">
            <p class="question-number">Question ${state.quiz.index + 1} of ${state.quiz.order.length}</p>
            <p class="quiz-question">${question.question}</p>
            <div class="choices">
              ${question.options.map((option, index) => `
                <button
                  class="btn-option ${state.quiz.solvedFlags[state.quiz.index] ? (index === question.answer ? "correct" : "") : ""}"
                  data-action="answer-quiz"
                  data-value="${index}"
                  ${state.quiz.solvedFlags[state.quiz.index] ? "disabled" : ""}
                >
                  ${String.fromCharCode(65 + index)}. ${option}
                </button>
              `).join("")}
            </div>
            <p class="feedback ${state.quiz.feedbackBad ? "bad" : ""}" aria-live="polite">${state.quiz.feedback}</p>
          </div>
        </section>
      `;
    }

    function renderFinal() {
      const allStars = state.stars === TOTAL_STARS;
      if (!state.confettiLaunched) {
        launchConfetti();
        state.confettiLaunched = true;
      }

      return `
        <section class="panel final-screen">
          <div class="final-badge">Mission Complete</div>
          <h2 class="final-title">🏅 Supermarket IT Expert</h2>
          <div class="final-stars">
            <span>⭐</span>
            <span>${state.stars}/${TOTAL_STARS} stars earned</span>
          </div>
          <p class="final-subtitle">You showed how IT devices work together to help a shop.</p>
          ${allStars ? `<p class="final-subtitle" style="font-weight: 800; color: var(--green-dark);">🌟 Master Supermarket IT Expert 🌟</p>` : ""}
          <div class="button-row" style="justify-content: center; margin-top: 18px;">
            <button class="btn-primary" data-action="restart">Play again</button>
          </div>
        </section>
      `;
    }

    function render() {
      updateStars();

      if (state.screen === "welcome") {
        app.innerHTML = renderWelcome();
        return;
      }

      if (state.screen === "system") {
        app.innerHTML = renderSystem();
        return;
      }

      if (state.screen === "scan") {
        app.innerHTML = renderScanItem();
        return;
      }

      if (state.screen === "receipt") {
        app.innerHTML = renderReceipt();
        return;
      }

      if (state.screen === "match") {
        app.innerHTML = renderMatchBarcode();
        return;
      }

      if (state.screen === "quiz") {
        app.innerHTML = renderQuiz();
        return;
      }

      if (state.screen === "final") {
        app.innerHTML = renderFinal();
      }
    }

    app.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;

      const action = button.dataset.action;

      if (action === "start") {
        state.screen = "system";
        render();
        return;
      }

      if (action === "next") {
        const screen = button.dataset.screen;
        if (screen) {
          state.screen = screen;
          render();
        }
        return;
      }

      if (action === "restart") {
        resetGame();
        return;
      }

      if (action === "part") {
        const part = button.dataset.part;
        state.seenParts.add(part);
        state.systemMessage = `${part.charAt(0).toUpperCase() + part.slice(1)}: ${partText(part)}`;
        render();
        return;
      }

      if (action === "scan-item") {
        if (state.activity2.scanning || state.activity2.solved) return;
        state.activity2.scanning = true;
        state.activity2.feedback = "Beep... scanning...";
        state.activity2.feedbackBad = false;
        playBeep();
        render();

        schedule(() => {
          state.activity2.scanning = false;
          awardStar(state.activity2, "solved");
          state.activity2.feedback = `${state.activity2.item.name} found. ${state.activity2.item.price} baht.`;
          state.activity2.feedbackBad = false;
          render();
        }, 650);
        return;
      }

      if (action === "scan-receipt-item") {
        const barcode = button.dataset.barcode;
        const item = state.receipt.items.find((entry) => entry.barcode === barcode);
        if (!item || state.receipt.scanned[barcode] || state.receipt.scanning[barcode]) return;
        state.receipt.scanning[barcode] = true;
        state.receipt.feedback = `Beep... scanning ${item.name}.`;
        state.receipt.feedbackBad = false;
        playBeep();
        render();

        schedule(() => {
          state.receipt.scanning[barcode] = false;
          state.receipt.lines.push({ name: item.name, price: item.price, icon: item.icon, barcode: item.barcode });
          awardStar(state.receipt.scanned, barcode);
          state.receipt.feedback = `${item.name} added to the receipt.`;
          state.receipt.feedbackBad = false;
          render();
        }, 650);
        return;
      }

      if (action === "pick-product") {
        const barcode = button.dataset.barcode;
        if (state.match.matched[barcode]) return;
        if (state.match.selectedBarcode) {
          if (state.match.selectedBarcode === barcode) {
            const product = findProductByBarcode(barcode);
            state.match.selectedProduct = "";
            state.match.selectedBarcode = "";
            playMatchSound("correct");
            awardStar(state.match.matched, barcode);
            state.match.feedback = `Great match: ${product.name}.`;
            state.match.feedbackBad = false;
          } else {
            playMatchSound("wrong");
            state.match.feedback = "Not quite. Try again.";
            state.match.feedbackBad = true;
            state.match.selectedProduct = "";
            state.match.selectedBarcode = "";
          }
        } else {
          state.match.selectedProduct = barcode;
          state.match.feedback = "Now pick the barcode.";
          state.match.feedbackBad = false;
        }
        render();
        return;
      }

      if (action === "pick-barcode") {
        const barcode = button.dataset.barcode;
        if (state.match.matched[barcode]) return;
        if (state.match.selectedProduct) {
          if (state.match.selectedProduct === barcode) {
            const product = findProductByBarcode(barcode);
            state.match.selectedProduct = "";
            state.match.selectedBarcode = "";
            playMatchSound("correct");
            awardStar(state.match.matched, barcode);
            state.match.feedback = `Great match: ${product.name}.`;
            state.match.feedbackBad = false;
          } else {
            playMatchSound("wrong");
            state.match.feedback = "Not quite. Try again.";
            state.match.feedbackBad = true;
            state.match.selectedProduct = "";
            state.match.selectedBarcode = "";
          }
        } else {
          state.match.selectedBarcode = barcode;
          state.match.feedback = "Now pick the product.";
          state.match.feedbackBad = false;
        }
        render();
        return;
      }

      if (action === "answer-quiz") {
        const index = state.quiz.index;
        if (state.quiz.solvedFlags[index] || state.quiz.locked) return;
        const choice = Number(button.dataset.value);
        const item = currentQuizItem();

        if (choice === item.answer) {
          state.quiz.locked = true;
          state.quiz.feedback = "Great job!";
          state.quiz.feedbackBad = false;
          awardStar(state.quiz.solvedFlags, index);
          render();

          schedule(() => {
            state.quiz.locked = false;
            state.quiz.feedback = "";
            state.quiz.feedbackBad = false;
            state.quiz.index += 1;
            if (state.quiz.index >= state.quiz.order.length) {
              state.screen = "final";
            }
            render();
          }, 850);
        } else {
          state.quiz.feedback = "Try again.";
          state.quiz.feedbackBad = true;
          render();
        }
      }
    });

    createRunState();
    updateStars();
    render();
  </script>
</body>
</html>
